<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>VoxGate</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <button class="header-btn" id="langBtn" aria-label="Sprache umschalten">DE-CH</button>
  <div class="header-center">
    <span class="logo" id="logo">VoxGate</span>
  </div>
  <button class="header-btn" id="muteBtn" aria-label="Sprachausgabe stummschalten">🔊</button>
  <div class="status-dot" id="statusDot"></div>
</header>

<main id="messages">
  <div class="empty-state" id="emptyState">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4">
      <rect x="9" y="2" width="6" height="13" rx="3"/>
      <path d="M5 10 C5 16 19 16 19 10"/><line x1="12" y1="16" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/>
    </svg>
    <span>Tippen und sprechen</span>
    <span class="empty-hint">Nochmal tippen = senden</span>
  </div>
</main>

<footer>
  <div class="transcript-box" id="transcriptBox" aria-live="polite">Bereit...</div>
  <button class="mic-btn" id="micBtn" aria-label="Record and send">
    <span class="mic-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="9" y="2" width="6" height="13" rx="3"/>
        <path d="M5 10 C5 16 19 16 19 10"/><line x1="12" y1="16" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/>
      </svg>
    </span>
    <span id="micLabel">Aufnehmen</span>
  </button>
  <button class="new-conv-btn" id="newConvBtn">Neues Gespräch</button>
</footer>

<script src="app.js"></script>
</body>
</html>
